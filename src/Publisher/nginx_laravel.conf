#user http;
worker_processes  1;

include modules.d/*.conf;

events {
    worker_connections  1024;
}

http {
    types_hash_max_size 4096;
    types_hash_bucket_size 128;

    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    
    # Increase buffer sizes for large headers
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    
    # Extract Laravel project name from URI
    map $request_uri $laravel_project_name {
        ~^/apps/(?<project>[^/]+)/public  $project;
        default                             "";
    }

    server {
        listen       80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.php index.html index.htm;

        # Handle other PHP files in Laravel projects (not index.php)
        location ~ ^/apps/([^/]+)/public/.*\.php$ {
            fastcgi_pass   unix:/run/php-fpm/php-fpm.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
            include        fastcgi_params;
        }
        
        # Auto-detect Laravel projects in /apps/*/public/
        location ~ ^/apps/([^/]+)/public {
            # Try to serve file directly, if not found pass to index.php
            # This mimics: RewriteCond %{REQUEST_FILENAME} !-f
            #              RewriteRule ^ index.php [L]
            try_files $uri $uri/ /apps/$1/public/index.php?$query_string;
        }
        
        # Handle PHP files in Laravel projects
        location ~ ^/apps/([^/]+)/public/index\.php$ {
            # This handles the rewritten requests from try_files above
            fastcgi_pass   unix:/run/php-fpm/php-fpm.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
            
            # Pass Authorization header (mimics Apache RewriteRule)
            fastcgi_param  HTTP_AUTHORIZATION $http_authorization;
        }

        # Default location for non-Laravel files
        location / {
            try_files $uri $uri/ =404;
        }

        # Teruskan file .php ke PHP-FPM (untuk non-Laravel PHP files)
        location ~ \.php$ {
            fastcgi_pass   unix:/run/php-fpm/php-fpm.sock;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include        fastcgi_params;
        }

        # deny access to .htaccess files
        location ~ /\.ht {
            deny  all;
        }
    }
}
