<script>
document.addEventListener('DOMContentLoaded', function() {
    // Initialize DataTables
    const table = $('#datatable').DataTable({
        serverSide: true,
        ajax: {
            url: '/datatable/data',
            type: 'POST',
            headers: {
                'X-CSRF-TOKEN': ''
            },
            data: function(d) {
                // Add custom filter data
                d.filters = window.tableFilters || {};
                return d;
            },
            error: function(xhr, error, code) {
                console.error('DataTables AJAX error:', error, code);
                alert('Failed to load table data. Please refresh the page.');
            }
        },
        processing: true,
        columns: [{"data":"title"},{"data":"content"}],
        responsive: true,
        pageLength: 10,
        lengthMenu: [[10, 25, 50, 100, -1], [10, 25, 50, 100, 'All']],
        language: {
            processing: '<div class="flex items-center justify-center gap-2"><div class="animate-spin rounded-full h-5 w-5 border-b-2 border-indigo-600"></div><span>Loading...</span></div>',
            emptyTable: 'No data available',
            zeroRecords: 'No matching records found',
            info: 'Showing _START_ to _END_ of _TOTAL_ entries',
            infoEmpty: 'Showing 0 to 0 of 0 entries',
            infoFiltered: '(filtered from _MAX_ total entries)',
            search: 'Search:',
            paginate: {
                first: 'First',
                last: 'Last',
                next: 'Next',
                previous: 'Previous'
            }
        },
        dom: '<"flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4"<"flex-1"f><"flex items-center gap-2"lB>>rtip',
        buttons: [
            {
                extend: 'copy',
                className: 'btn btn-sm btn-outline'
            },
            {
                extend: 'csv',
                className: 'btn btn-sm btn-outline'
            },
            {
                extend: 'excel',
                className: 'btn btn-sm btn-outline'
            },
            {
                extend: 'pdf',
                className: 'btn btn-sm btn-outline'
            },
            {
                extend: 'print',
                className: 'btn btn-sm btn-outline'
            }
        ]
    });

    // Store table instance globally for external access
    window.dataTable = table;

    // Initialize Lucide icons after DataTables renders
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
});
</script>
