name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        php-version: ['8.2', '8.3']
    
    name: Performance Tests (PHP ${{ matrix.php-version }})
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, pdo, pdo_sqlite, redis
          coverage: none
      
      - name: Install dependencies
        run: |
          cd packages/canvastack/canvastack
          composer install --prefer-dist --no-progress --no-suggest
      
      - name: Setup Redis
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: '7.x'
      
      - name: Run performance regression tests
        run: |
          cd packages/canvastack/canvastack
          ./vendor/bin/phpunit --testsuite=Performance --filter=PerformanceRegressionTest --verbose
      
      - name: Run all performance tests
        run: |
          cd packages/canvastack/canvastack
          ./vendor/bin/phpunit --testsuite=Performance --verbose
      
      - name: Generate performance report
        if: always()
        run: |
          cd packages/canvastack/canvastack
          php artisan performance:report --format=markdown > performance-report.md
      
      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-report-php-${{ matrix.php-version }}
          path: packages/canvastack/canvastack/performance-report.md
      
      - name: Comment PR with performance results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('packages/canvastack/canvastack/performance-report.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Performance Test Results (PHP ${{ matrix.php-version }})\n\n${report}`
            });
      
      - name: Fail on performance regression
        run: |
          cd packages/canvastack/canvastack
          ./vendor/bin/phpunit --testsuite=Performance --filter=PerformanceRegressionTest --stop-on-failure

  performance-comparison:
    runs-on: ubuntu-latest
    needs: performance-tests
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, redis
      
      - name: Install dependencies
        run: |
          cd packages/canvastack/canvastack
          composer install --prefer-dist --no-progress
      
      - name: Setup Redis
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: '7.x'
      
      - name: Run performance tests on current branch
        run: |
          cd packages/canvastack/canvastack
          ./vendor/bin/phpunit --testsuite=Performance --log-json=performance-current.json
      
      - name: Checkout base branch
        run: |
          git checkout ${{ github.base_ref }}
      
      - name: Install dependencies (base)
        run: |
          cd packages/canvastack/canvastack
          composer install --prefer-dist --no-progress
      
      - name: Run performance tests on base branch
        run: |
          cd packages/canvastack/canvastack
          ./vendor/bin/phpunit --testsuite=Performance --log-json=performance-base.json
      
      - name: Compare performance
        run: |
          cd packages/canvastack/canvastack
          php artisan performance:compare performance-base.json performance-current.json > performance-comparison.md
      
      - name: Comment PR with comparison
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const comparison = fs.readFileSync('packages/canvastack/canvastack/performance-comparison.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Performance Comparison\n\n${comparison}`
            });

